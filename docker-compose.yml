services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: allweb_urlshort_app
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - allweb

  mysql:
    image: mysql:8.4
    container_name: allweb_urlshort_mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: allweb_urlshort
      MYSQL_USER: allweb
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - allweb_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/allweb.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - allweb

networks:
  allweb:
    driver: bridge

volumes:
  allweb_mysql_data:
