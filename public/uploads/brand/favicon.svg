<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ShortLink Pro favicon</title>
  <desc id="desc">A rounded blue app icon with an interlocking short-link symbol.</desc>
  <defs>
    <linearGradient id="favicon-tile" x1="82" y1="52" x2="430" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset=".5" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="favicon-shine" x1="118" y1="58" x2="376" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".38"/>
      <stop offset=".7" stop-color="#FFFFFF" stop-opacity=".08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="favicon-link" x1="126" y1="366" x2="390" y2="142" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FEFF"/>
      <stop offset=".58" stop-color="#DFFBFF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="favicon-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#082F49" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect x="34" y="34" width="444" height="444" rx="108" fill="#0F172A" filter="url(#favicon-shadow)"/>
  <rect x="44" y="44" width="424" height="424" rx="96" fill="url(#favicon-tile)"/>
  <path d="M94 60h168c109 0 182 72 184 181v158c-84-8-150-43-198-105L94 60Z" fill="url(#favicon-shine)"/>
  <path d="M55 357c83 64 180 88 288 70 53-9 95-27 125-52v45c0 27-22 49-49 49H92c-26 0-48-22-48-48v-33l11-31Z" fill="#075985" opacity=".18"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M205 315 174 346c-43 43-113 43-156 0s-43-113 0-156l42-42c43-43 113-43 156 0" transform="translate(82 -34)" stroke="#075985" stroke-width="78" opacity=".26"/>
    <path d="M307 197 338 166c43-43 113-43 156 0s43 113 0 156l-42 42c-43 43-113 43-156 0" transform="translate(-82 34)" stroke="#075985" stroke-width="78" opacity=".26"/>
    <path d="M205 315 174 346c-43 43-113 43-156 0s-43-113 0-156l42-42c43-43 113-43 156 0" transform="translate(82 -34)" stroke="url(#favicon-link)" stroke-width="54"/>
    <path d="M307 197 338 166c43-43 113-43 156 0s43 113 0 156l-42 42c-43 43-113 43-156 0" transform="translate(-82 34)" stroke="url(#favicon-link)" stroke-width="54"/>
    <path d="M190 322 322 190" stroke="#DFFBFF" stroke-width="42"/>
    <path d="M190 322 322 190" stroke="#0EA5E9" stroke-width="16" opacity=".88"/>
  </g>
